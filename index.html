<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRID RSI EA — Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d0d;color:#e0e0e0;min-height:100vh}
.topbar{background:#111;border-bottom:1px solid #1f1f1f;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:15px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px}
.conn{display:flex;align-items:center;gap:6px;font-size:12px;color:#666}
.cdot{width:7px;height:7px;border-radius:50%;background:#ef4444;animation:pulse 2s infinite}
.cdot.ok{background:#22c55e}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.rbtn{font-size:12px;padding:4px 10px;border:1px solid #2a2a2a;border-radius:6px;background:#1a1a1a;color:#888;cursor:pointer}
.rbtn:hover{color:#fff;border-color:#444}
.page{padding:14px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:10px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:14px}
.mcard{background:#161616;border:1px solid #1f1f1f;border-radius:10px;padding:12px 14px}
.mcard .lbl{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.mcard .val{font-size:20px;font-weight:700;color:#fff;line-height:1}
.mcard .sub{font-size:11px;color:#444;margin-top:4px}
.pos{color:#22c55e!important}.neg{color:#ef4444!important}.wrn{color:#f59e0b!important}
.dd-wrap{background:#1f1f1f;border-radius:3px;height:5px;margin-top:7px}
.dd-fill{height:5px;border-radius:3px;transition:width .5s}
.dd-lbl{font-size:10px;color:#444;margin-top:3px}
.section{background:#111;border:1px solid #1f1f1f;border-radius:12px;overflow:hidden;margin-bottom:12px}
.sec-head{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1a1a1a}
.sec-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em}
.tabs{display:flex;gap:6px;padding:10px 14px 0}
.tab{font-size:12px;padding:5px 12px;border:1px solid #2a2a2a;border-radius:6px;background:none;color:#555;cursor:pointer;margin-bottom:10px}
.tab.on{background:#1f1f1f;color:#fff;border-color:#444}
.hist-wrap{padding:0 14px 10px}
.hrow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #181818;font-size:13px}
.hrow:last-child{border:none}
.hrow-l{display:flex;align-items:center;gap:8px}
.hrow-r{display:flex;align-items:center;gap:10px}
.ico{font-size:14px;width:20px;text-align:center}
.badge{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700}
.b-buy{background:#052e16;color:#22c55e}
.b-sell{background:#450a0a;color:#f87171}
.b-rec{background:#1e3a5f;color:#60a5fa}
.b-warn{background:#451a03;color:#fbbf24}
.b-info{background:#1a1a2e;color:#818cf8}
.warn-banner{background:#451a03;border:1px solid #92400e;border-radius:10px;padding:11px 14px;margin-bottom:12px;font-size:13px;color:#fbbf24;display:none;align-items:center;gap:8px}
.profit-chart{padding:10px 14px 14px}
.bar-wrap{display:flex;align-items:flex-end;gap:4px;height:60px}
.bar{min-width:18px;border-radius:3px 3px 0 0;transition:height .4s;flex:1;position:relative}
.bar-lbl{font-size:9px;color:#444;text-align:center;margin-top:3px}
.empty-msg{text-align:center;color:#333;padding:24px 0;font-size:13px}
.upd{font-size:10px;color:#333;padding:8px 14px;text-align:right}
.pulse-new{animation:newrow .6s ease}
@keyframes newrow{from{background:#1a2e1a}to{background:transparent}}
@media(max-width:480px){.mcard .val{font-size:17px}.page{padding:10px}}
</style>
</head>
<body>

<div class="topbar">
  <h1>📊 GRID RSI EA</h1>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="conn"><span class="cdot" id="cdot"></span><span id="ctxt">menghubungkan...</span></div>
    <button class="rbtn" onclick="fetchData()">↻ refresh</button>
    <button class="rbtn" onclick="clearData()" style="color:#555">🗑</button>
  </div>
</div>

<div class="page">

<div class="warn-banner" id="wbanner">
  ⚠️ <span id="wtxt">Drawdown tinggi!</span>
</div>

<!-- Metrics Row 1 -->
<div class="grid4">
  <div class="mcard">
    <div class="lbl">profit hari ini</div>
    <div class="val pos" id="m-today">+$0.00</div>
    <div class="sub" id="m-pips">0 pip</div>
  </div>
  <div class="mcard">
    <div class="lbl">balance</div>
    <div class="val" id="m-bal">$0.00</div>
    <div class="sub" id="m-eq">equity: $0.00</div>
  </div>
  <div class="mcard">
    <div class="lbl">drawdown</div>
    <div class="val" id="m-dd">0.0%</div>
    <div class="dd-wrap"><div class="dd-fill" id="dd-fill" style="width:0%;background:#22c55e"></div></div>
    <div class="dd-lbl" id="dd-lbl">aman</div>
  </div>
  <div class="mcard">
    <div class="lbl">open orders</div>
    <div class="val" id="m-ord">0</div>
    <div class="sub" id="m-ord-s">0 buy / 0 sell</div>
  </div>
</div>

<!-- WR Row -->
<div class="grid3">
  <div class="mcard">
    <div class="lbl">WR hari ini</div>
    <div class="val pos" id="m-wr1">—</div>
  </div>
  <div class="mcard">
    <div class="lbl">WR minggu</div>
    <div class="val pos" id="m-wr2">—</div>
  </div>
  <div class="mcard">
    <div class="lbl">WR bulan</div>
    <div class="val pos" id="m-wr3">—</div>
  </div>
</div>

<!-- History -->
<div class="section">
  <div class="tabs">
    <button class="tab on" onclick="switchTab('all',this)">semua</button>
    <button class="tab" onclick="switchTab('open',this)">open</button>
    <button class="tab" onclick="switchTab('close',this)">closed</button>
    <button class="tab" onclick="switchTab('warn',this)">peringatan</button>
  </div>
  <div class="hist-wrap" id="hist"></div>
</div>

<div class="upd" id="upd">terakhir update: —</div>

</div><!-- /page -->

<script>
var TOKEN   = '8996029319:AAEzSF1CUUxh6EfnW_lk2v3T_n95LQRfWjI';
var CHAT_ID = '5670221277';
var STORE_KEY = 'tgea_msgs_v2';
var OFFSET_KEY = 'tgea_offset';
var CUR_TAB = 'all';

// ── Storage helpers ──────────────────────────────────────────────
function loadMsgs(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)||'[]'); }
  catch(e){ return []; }
}
function saveMsgs(arr){
  // keep latest 500
  if(arr.length>500) arr=arr.slice(-500);
  localStorage.setItem(STORE_KEY, JSON.stringify(arr));
}
function loadOffset(){ return parseInt(localStorage.getItem(OFFSET_KEY)||'0'); }
function saveOffset(n){ localStorage.setItem(OFFSET_KEY, String(n)); }
function clearData(){
  if(!confirm('Hapus semua data history lokal?')) return;
  localStorage.removeItem(STORE_KEY);
  localStorage.removeItem(OFFSET_KEY);
  location.reload();
}

// ── Fetch from Telegram ──────────────────────────────────────────
async function fetchData(){
  try{
    var offset = loadOffset();
    var url = 'https://api.telegram.org/bot'+TOKEN+'/getUpdates?limit=100'+(offset?'&offset='+offset:'');
    var res  = await fetch(url);
    var data = await res.json();
    if(!data.ok){ setConn(false); return; }
    setConn(true);

    var results = data.result||[];
    if(results.length){
      var msgs = loadMsgs();
      var maxId = offset;
      results.forEach(function(u){
        if(u.message && u.message.text && u.message.chat.id.toString()===CHAT_ID){
          // avoid duplicates
          var exists = msgs.some(function(m){ return m.id===u.update_id; });
          if(!exists) msgs.push({id:u.update_id, text:u.message.text, date:u.message.date*1000});
          if(u.update_id>=maxId) maxId=u.update_id+1;
        }
      });
      saveMsgs(msgs);
      if(maxId>offset) saveOffset(maxId);
    }

    renderAll();
    document.getElementById('upd').textContent='terakhir update: '+new Date().toLocaleTimeString('id-ID');
  }catch(e){ setConn(false); console.error(e); }
}

function setConn(ok){
  document.getElementById('cdot').className='cdot'+(ok?' ok':'');
  document.getElementById('ctxt').textContent=ok?'terhubung':'gagal';
}

// ── Parse & Render ───────────────────────────────────────────────
function renderAll(){
  var msgs = loadMsgs();
  var stats = parseStats(msgs);
  var items = buildItems(msgs);
  updateMetrics(stats);
  renderHistory(items, CUR_TAB);
}

function parseStats(msgs){
  var s={todayProfit:0,todayPips:0,balance:0,equity:0,ddPct:0,openBuy:0,openSell:0,wrToday:0,wrWeek:0,wrMonth:0};
  // Use latest WIN RATE HARIAN for WR and balance
  var lastWR = null;
  msgs.forEach(function(m){
    var t=m.text;
    if(t.indexOf('WIN RATE HARIAN')>=0) lastWR=m;
  });
  if(lastWR){
    var t=lastWR.text;
    var b=t.match(/Balance\s*:\s*([\d.,]+)/); if(b) s.balance=parseFloat(b[1].replace(/,/g,''));
    var wt=t.match(/WR Today\s*:\s*([\d.]+)%/); if(wt) s.wrToday=parseFloat(wt[1]);
    var ww=t.match(/WR Week\s*:\s*([\d.]+)%/);  if(ww) s.wrWeek=parseFloat(ww[1]);
    var wm=t.match(/WR Month\s*:\s*([\d.]+)%/); if(wm) s.wrMonth=parseFloat(wm[1]);
    var td=t.match(/Today\s*:\s*[+-]?[\d.]+%\s*\|\s*([+-]?[\d.]+)\s*\w+\s*\|\s*(\d+)\s*pip/);
    if(td){s.todayProfit=parseFloat(td[1]);s.todayPips=parseInt(td[2]);}
  }
  // Latest balance from EA STARTED or OVERLAP
  msgs.forEach(function(m){
    var t=m.text;
    if(t.indexOf('EA STARTED')>=0||t.indexOf('OVERLAP RECOVERY')>=0){
      var b2=t.match(/Balance\s*:\s*([\d.,]+)/); if(b2) s.balance=parseFloat(b2[1].replace(/,/g,''));
    }
  });
  // Count open orders by tracking open vs close
  var buys=0,sells=0;
  msgs.forEach(function(m){
    var t=m.text;
    if((t.indexOf('OPEN ORDER')>=0||t.indexOf('GRID ORDER')>=0)&&t.indexOf('CLOSE')<0){
      if(t.indexOf('BUY')>=0) buys++; else sells++;
    }
    if(t.indexOf('CLOSE ORDER')>=0){
      if(t.indexOf('BUY')>=0) buys=Math.max(0,buys-1); else sells=Math.max(0,sells-1);
    }
    if(t.indexOf('OVERLAP RECOVERY')>=0){ buys=0; sells=0; } // reset after overlap
  });
  s.openBuy=buys; s.openSell=sells;
  // DD from latest warning
  var lastDD=null;
  msgs.forEach(function(m){ if(m.text.indexOf('WARNING: DRAWDOWN')>=0) lastDD=m; });
  if(lastDD){ var dd=lastDD.text.match(/DD\s*:\s*-([\d.]+)%/); if(dd) s.ddPct=parseFloat(dd[1]); }
  s.equity=s.balance>0?s.balance*(1-s.ddPct/100):0;
  return s;
}

function buildItems(msgs){
  var items=[];
  msgs.forEach(function(m){
    var t=m.text;
    if((t.indexOf('OPEN ORDER')>=0||t.indexOf('GRID ORDER')>=0)&&t.indexOf('CLOSE')<0){
      var side=t.indexOf('BUY')>=0?'BUY':'SELL';
      var lot=t.match(/Lot\s*:\s*([\d.]+)/);
      var price=t.match(/Price\s*:\s*([\d.]+)/);
      var isGrid=t.indexOf('GRID ORDER')>=0;
      var gn=isGrid?t.match(/#(\d+)/):null;
      items.push({type:'open',side:side,date:m.date,
        label:(isGrid?'Grid'+(gn?' #'+gn[1]:''):'Open')+' '+side,
        detail:'lot '+(lot?lot[1]:'-')+' @ '+(price?price[1]:'-'),profit:null});
    }
    if(t.indexOf('CLOSE ORDER')>=0){
      var side=t.indexOf('BUY')>=0?'BUY':'SELL';
      var pf=t.match(/Profit\s*:\s*([+-]?[\d.]+)/);
      var pp=t.match(/Pips\s*:\s*([+-]?\d+)/);
      var p=pf?parseFloat(pf[1]):0;
      items.push({type:'close',side:side,date:m.date,
        label:'Close '+side,
        detail:(pp?pp[1]+' pip':''),profit:p});
    }
    if(t.indexOf('OVERLAP RECOVERY')>=0){
      var net=t.match(/Net P\/L\s*:\s*([+-]?[\d.]+)/);
      var p=net?parseFloat(net[1]):0;
      items.push({type:'overlap',side:'-',date:m.date,label:'Overlap Recovery',detail:'',profit:p});
    }
    if(t.indexOf('EA STARTED')>=0){
      var b=t.match(/Balance\s*:\s*([\d.,]+)/);
      items.push({type:'info',side:'-',date:m.date,label:'EA Started',detail:b?'bal $'+b[1]:'',profit:null});
    }
    if(t.indexOf('EA STOPPED')>=0)
      items.push({type:'warn',side:'-',date:m.date,label:'EA Stopped',detail:'',profit:null});
    if(t.indexOf('WARNING: DRAWDOWN')>=0){
      var dd=t.match(/DD\s*:\s*-([\d.]+)%/);
      items.push({type:'warn',side:'-',date:m.date,label:'Drawdown Warning',detail:dd?dd[1]+'%':'',profit:null});
    }
    if(t.indexOf('WIN RATE HARIAN')>=0){
      var wt=t.match(/WR Today\s*:\s*([\d.]+)%/);
      items.push({type:'info',side:'-',date:m.date,label:'Win Rate Report',detail:wt?'WR '+wt[1]+'%':'',profit:null});
    }
  });
  return items;
}

function updateMetrics(s){
  var tp=s.todayProfit;
  var el=document.getElementById('m-today');
  el.textContent=(tp>=0?'+$':'$')+Math.abs(tp).toFixed(2);
  el.className='val '+(tp>=0?'pos':'neg');
  document.getElementById('m-pips').textContent=s.todayPips+' pip';
  document.getElementById('m-bal').textContent='$'+s.balance.toFixed(2);
  document.getElementById('m-eq').textContent='equity: $'+s.equity.toFixed(2);
  var dd=s.ddPct;
  var ddEl=document.getElementById('m-dd');
  ddEl.textContent=dd.toFixed(1)+'%';
  ddEl.className='val '+(dd<10?'pos':dd<20?'wrn':'neg');
  document.getElementById('dd-fill').style.cssText='width:'+Math.min(dd,100)+'%;background:'+(dd<10?'#22c55e':dd<20?'#f59e0b':'#ef4444');
  document.getElementById('dd-lbl').textContent=dd<10?'aman':dd<20?'waspada':'⚠ bahaya!';
  document.getElementById('m-ord').textContent=s.openBuy+s.openSell;
  document.getElementById('m-ord-s').textContent=s.openBuy+' buy / '+s.openSell+' sell';
  function wc(v){return v>=60?'pos':v>=40?'wrn':'neg';}
  ['wr1','wr2','wr3'].forEach(function(id,i){
    var v=[s.wrToday,s.wrWeek,s.wrMonth][i];
    var el2=document.getElementById('m-'+id);
    el2.textContent=v>0?v.toFixed(1)+'%':'—';
    el2.className='val '+wc(v);
  });
  var wb=document.getElementById('wbanner');
  if(dd>=20){
    wb.style.display='flex';
    document.getElementById('wtxt').textContent='DD '+dd.toFixed(1)+'% — segera monitor posisi!';
  } else wb.style.display='none';
}

var ICONS={open:'📈',close:'📉',overlap:'🔄',warn:'⚠️',info:'ℹ️'};
function renderHistory(items,tab){
  items=items.slice().sort(function(a,b){return b.date-a.date;});
  var filtered=items.filter(function(i){
    if(tab==='all') return true;
    if(tab==='open') return i.type==='open';
    if(tab==='close') return i.type==='close'||i.type==='overlap';
    if(tab==='warn') return i.type==='warn'||i.type==='info';
    return true;
  });
  var el=document.getElementById('hist');
  if(!filtered.length){
    el.innerHTML='<div class="empty-msg">tidak ada data</div>';
    return;
  }
  var html='';
  filtered.slice(0,50).forEach(function(i,idx){
    var badge='';
    if(i.side==='BUY') badge='<span class="badge b-buy">BUY</span>';
    else if(i.side==='SELL') badge='<span class="badge b-sell">SELL</span>';
    else if(i.type==='overlap') badge='<span class="badge b-rec">RECOVERY</span>';
    else if(i.type==='warn') badge='<span class="badge b-warn">WARN</span>';
    else if(i.type==='info') badge='<span class="badge b-info">INFO</span>';
    var pfHtml='';
    if(i.profit!==null){
      pfHtml='<span class="'+(i.profit>=0?'pos':'neg')+'" style="font-weight:700;font-size:13px">'+(i.profit>=0?'+':'')+i.profit.toFixed(2)+'</span>';
    }
    var dt=i.detail?'<span style="font-size:11px;color:#444;margin-left:4px">'+i.detail+'</span>':'';
    var ts=new Date(i.date).toLocaleString('id-ID',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    html+='<div class="hrow'+(idx===0?' pulse-new':'')+'"><div class="hrow-l"><span class="ico">'+(ICONS[i.type]||'•')+'</span><span style="color:#ccc">'+i.label+'</span>'+badge+dt+'</div><div class="hrow-r">'+pfHtml+'<span style="font-size:11px;color:#333">'+ts+'</span></div></div>';
  });
  el.innerHTML=html;
}

function switchTab(tab,btn){
  CUR_TAB=tab;
  document.querySelectorAll('.tab').forEach(function(b){b.className='tab';});
  btn.className='tab on';
  renderHistory(buildItems(loadMsgs()),tab);
}

// Boot
renderAll();
fetchData();
setInterval(fetchData,30000);
</script>
</body>
</html>
